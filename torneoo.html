<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo de Fútbol Sala · Octavos de Final</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>

:root {
  --black:  #0c0c0c;
  --dark:   #161616;
  --card:   #1c1c1c;
  --border: #2e2e2e;
  --red:    #cc1111;
  --yellow: #f5c800;
  --white:  #f0f0f0;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Barlow Condensed', sans-serif;
  min-height: 100vh;
}

/* ─── HEADER ──────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(10px,2.5vw,24px);
  padding: clamp(12px,3vw,30px) clamp(14px,4vw,44px);
  border-bottom: 2px solid var(--red);
  background: linear-gradient(180deg,#1c0000,var(--black));
}

.header-logo {
  height: clamp(42px,7vw,82px);
  width:  clamp(42px,7vw,82px);
  object-fit: contain;
  flex-shrink: 0;
  filter: drop-shadow(0 0 10px rgba(245,200,0,.45));
}

.header-eyebrow {
  font-size: clamp(9px,1.3vw,13px);
  letter-spacing: 3px;
  color: var(--yellow);
  font-weight: 700;
  text-transform: uppercase;
}

.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(22px,5.5vw,58px);
  letter-spacing: clamp(2px,.5vw,6px);
  line-height: 1;
  text-shadow: 0 0 40px rgba(204,17,17,.5);
}

.header-title span { color: var(--yellow); }

.header-rule {
  height: 2px;
  margin-top: clamp(5px,1vw,12px);
  background: linear-gradient(90deg,transparent,var(--red),var(--yellow),var(--red),transparent);
}

/* ─── WRAP ────────────────────────── */
.wrap {
  padding: clamp(14px,2.5vw,32px) clamp(8px,2vw,24px) 56px;
}

/* round labels */
.rlrow {
  display: flex;
  align-items: center;
  margin-bottom: clamp(8px,1.5vw,16px);
}

.rl {
  flex: 1;
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(8px,1.2vw,14px);
  letter-spacing: 2px;
  padding: clamp(3px,.5vw,6px) 0;
  border-radius: 3px;
  color: rgba(240,240,240,.55);
  background: var(--dark);
  border: 1px solid var(--border);
}

.rl.fin {
  color: var(--yellow);
  background: #1a0800;
  border-color: var(--yellow);
  font-size: clamp(9px,1.4vw,16px);
}

.rl-gap { flex: 0 0 clamp(8px,1.2vw,18px); }

/* ─── BRACKET ─────────────────────── */
.bracket {
  display: flex;
  align-items: center;
  width: 100%;
}

.half {
  flex: 1;
  display: flex;
  align-items: center;
  min-width: 0;
}

.half.right { flex-direction: row-reverse; }

.col {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.col-oct  { justify-content: space-around; }
.col-qrt  { justify-content: space-evenly; }
.col-semi { justify-content: center; }

.pipe {
  width: clamp(10px,1.4vw,20px);
  flex-shrink: 0;
  align-self: stretch;
  position: relative;
}

.pipe svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: visible;
  pointer-events: none;
}

/* ─── MATCHUP & TEAM ──────────────── */
.matchup {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: clamp(3px,.6vw,8px) 0;
}

.team {
  display: flex;
  align-items: center;
  gap: clamp(3px,.5vw,7px);
  background: var(--card);
  border: 1.5px solid var(--border);
  border-left: 3px solid #383838;
  border-radius: 4px;
  padding: clamp(4px,.65vw,8px) clamp(5px,.9vw,11px);
  min-height: clamp(28px,3.8vw,44px);
}

.team.winner {
  background: #160000;
  border-color: var(--yellow);
  border-left-color: var(--yellow);
  box-shadow: 0 0 9px rgba(245,200,0,.17);
}

.team.winner .t-name  { color: var(--yellow); font-weight: 700; }
.team.winner .t-score { color: var(--yellow); }
.team.loser           { opacity: .35; }

.team.tbd {
  background: rgba(255,255,255,.025);
  border: 1.5px dashed #2d2d2d;
}

.t-name {
  flex: 1;
  font-size: clamp(8px,1.2vw,14px);
  font-weight: 600;
  color: var(--white);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.team.tbd .t-name {
  color: rgba(255,255,255,.22);
  font-style: italic;
  font-weight: 400;
}

.t-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(12px,1.7vw,20px);
  color: rgba(255,255,255,.22);
  min-width: clamp(12px,1.4vw,18px);
  text-align: right;
  flex-shrink: 0;
}

/* ─── CENTER ──────────────────────── */
.center {
  width: clamp(100px,13vw,175px);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(4px,.6vw,8px);
  padding: 0 clamp(4px,.8vw,12px);
}

.trophy-ring {
  width:  clamp(78px,10.5vw,142px);
  height: clamp(78px,10.5vw,142px);
  border-radius: 50%;
  border: 2px solid var(--yellow);
  background: radial-gradient(circle,#1e0000 30%,#080000 100%);
  box-shadow: 0 0 28px rgba(204,17,17,.5), 0 0 55px rgba(245,200,0,.18);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow {
  0%,100% { box-shadow: 0 0 24px rgba(204,17,17,.4),0 0 44px rgba(245,200,0,.15); }
  50%      { box-shadow: 0 0 44px rgba(204,17,17,.7),0 0 68px rgba(245,200,0,.3); }
}

.trophy-img {
  width: 67%; height: 67%;
  object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(245,200,0,.6));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

.c-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(10px,1.4vw,17px);
  letter-spacing: 3px;
  color: var(--yellow);
  text-align: center;
  text-shadow: 0 0 14px rgba(245,200,0,.5);
}

.c-date {
  font-size: clamp(7px,.9vw,11px);
  letter-spacing: 2px;
  color: rgba(255,255,255,.32);
  text-align: center;
}

.finalist-block {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.f-slot {
  background: #160000;
  border: 1.5px solid var(--yellow);
  border-radius: 4px;
  padding: clamp(3px,.5vw,6px) clamp(5px,.7vw,9px);
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(8px,1.1vw,14px);
  letter-spacing: 1px;
  color: var(--yellow);
  box-shadow: 0 0 8px rgba(245,200,0,.12);
  min-height: clamp(22px,2.8vw,32px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.f-slot.tbd {
  background: transparent;
  border: 1.5px dashed #2d2d2d;
  color: rgba(255,255,255,.2);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(7px,.95vw,11px);
  font-weight: 400;
  box-shadow: none;
}

.f-vs {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(9px,1.2vw,14px);
  color: var(--red);
  text-align: center;
  letter-spacing: 3px;
}

.champ-box {
  width: 100%;
  border: 2px solid var(--yellow);
  border-radius: 5px;
  padding: clamp(4px,.7vw,9px) 5px;
  text-align: center;
  background: linear-gradient(135deg,rgba(245,200,0,.1),rgba(204,17,17,.08));
  box-shadow: 0 0 16px rgba(245,200,0,.22);
}

.champ-label {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(8px,1vw,12px);
  letter-spacing: 2px;
  color: var(--yellow);
}

.champ-name {
  display: block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(11px,1.6vw,19px);
  color: var(--white);
  letter-spacing: 2px;
}

.venue {
  font-size: clamp(6px,.85vw,10px);
  letter-spacing: 1.5px;
  color: rgba(255,255,255,.22);
  text-align: center;
  text-transform: uppercase;
}

.pipe-line { stroke: #441111; stroke-width: 1.5; }

footer {
  text-align: center;
  padding: 14px;
  border-top: 1px solid var(--border);
  font-size: clamp(8px,.95vw,11px);
  letter-spacing: 2px;
  color: rgba(255,255,255,.16);
  text-transform: uppercase;
}
</style>
</head>

<script>
/* ==============================================
   DATOS — edita solo este bloque

   CÓMO AGREGAR CUARTOS, SEMIS, FINAL:
   - Reemplaza 'por definir' con el nombre del equipo
   - Cuando el partido se juegue agrega winner y scores

   Llaves:
     Octavos izq  → L1  L2  L3  L4
     Octavos der  → R1  R2  R3  R4
     Cuartos izq  → LQ1  LQ2
     Cuartos der  → RQ1  RQ2
     Semis izq    → LS1
     Semis der    → RS1
     Gran Final   → GF
============================================== */

const DATA = {
  L1:  { teams: ['3-6 Los Novatos',  '2-9 Panthers'],        winner: null, scores: [0,0] },
  L2:  { teams: ['1-6 Bilbao',       'Ganador Llave 1'],     winner: null, scores: [0,0] },
  L3:  { teams: ['2-9 FC',           '2-6 Blue Lock'],       winner: null, scores: [0,0] },
  L4:  { teams: ['Maestros',         '2-2 Torbellinos'],     winner: null, scores: [0,0] },

  R1:  { teams: ['3-6 Urban',        'Ganador Llave 2'],     winner: null, scores: [0,0] },
  R2:  { teams: ['3-4 Los Toros',    '2-12 City'],           winner: null, scores: [0,0] },
  R3:  { teams: ['2-13 Software',    '1-9 Golden'],          winner: null, scores: [0,0] },
  R4:  { teams: ['3-8 Santos',       '2-7'],                 winner: null, scores: [0,0] },

  LQ1: { teams: ['por definir', 'por definir'], winner: null, scores: [0,0] },
  LQ2: { teams: ['por definir', 'por definir'], winner: null, scores: [0,0] },
  RQ1: { teams: ['por definir', 'por definir'], winner: null, scores: [0,0] },
  RQ2: { teams: ['por definir', 'por definir'], winner: null, scores: [0,0] },

  LS1: { teams: ['por definir', 'por definir'], winner: null, scores: [0,0] },
  RS1: { teams: ['por definir', 'por definir'], winner: null, scores: [0,0] },

  GF:  { teams: ['por definir', 'por definir'], winner: null, scores: [0,0] },
};

/* ==============================================
   MOTOR — no tocar
============================================== */

function render() {
  Object.keys(DATA).forEach(k => {
    const d = DATA[k];
    document.querySelectorAll(`[data-key="${k}"]`).forEach(el => {
      const p   = +el.dataset.pos;
      const nm  = d.teams[p] || 'por definir';
      const tbd = nm === 'por definir';
      el.querySelector('.t-name').textContent  = nm;
      el.querySelector('.t-score').textContent = '';
      el.classList.remove('winner','loser');
      el.classList.toggle('tbd', tbd);
      if (!tbd && d.winner) {
        if (d.winner === nm) {
          el.classList.add('winner');
          el.querySelector('.t-score').textContent = d.scores[p];
        } else {
          el.classList.add('loser');
          el.querySelector('.t-score').textContent = d.scores[p];
        }
      }
    });
  });

  const gf = DATA.GF;
  const setSlot = (id, val) => {
    const el = document.getElementById(id);
    const tbd = val === 'por definir';
    el.textContent = tbd ? (id === 'fin-L' ? 'Finalista 1' : 'Finalista 2') : val;
    el.classList.toggle('tbd', tbd);
  };
  setSlot('fin-L', gf.teams[0]);
  setSlot('fin-R', gf.teams[1]);

  const cb = document.getElementById('champ-box');
  if (gf.winner) {
    cb.style.display = 'block';
    document.getElementById('champ-name').textContent = gf.winner;
  } else {
    cb.style.display = 'none';
  }
}

function drawPipe(pipeId, fromId, toId, mirror) {
  const pipe = document.getElementById(pipeId);
  if (!pipe) return;
  const svg  = pipe.querySelector('svg');
  svg.innerHTML = '';
  if (!fromId || !toId) return;
  const fromEl = document.getElementById(fromId);
  const toEl   = document.getElementById(toId);
  if (!fromEl || !toEl) return;

  const pR     = pipe.getBoundingClientRect();
  if (!pR.width) return;
  const fromMs = Array.from(fromEl.querySelectorAll('.matchup'));
  const toMs   = Array.from(toEl.querySelectorAll('.matchup'));

  if (fromMs.length <= toMs.length) {
    const ratio = Math.floor(toMs.length / fromMs.length);
    fromMs.forEach((fromM, fi) => {
      const grp = toMs.slice(fi * ratio, (fi + 1) * ratio);
      if (!grp.length) return;
      const fR  = fromM.getBoundingClientRect();
      const fY  = fR.top + fR.height / 2 - pR.top;
      const gT  = grp[0].getBoundingClientRect();
      const gB  = grp[grp.length - 1].getBoundingClientRect();
      const yT  = gT.top + gT.height / 2 - pR.top;
      const yB  = gB.top + gB.height / 2 - pR.top;
      const yMd = (yT + yB) / 2;
      const xS  = mirror ? pR.width : 0;
      const xJ  = pR.width / 2;
      const xD  = mirror ? 0 : pR.width;
      ln(svg, xS, fY,  xJ, yMd);
      ln(svg, xJ, yT,  xJ, yB);
      ln(svg, xJ, yT,  xD, yT);
      ln(svg, xJ, yB,  xD, yB);
    });
  } else {
    const ratio = Math.floor(fromMs.length / toMs.length);
    toMs.forEach((toM, ti) => {
      const grp = fromMs.slice(ti * ratio, (ti + 1) * ratio);
      if (!grp.length) return;
      const fR  = grp[0].getBoundingClientRect();
      const lR  = grp[grp.length - 1].getBoundingClientRect();
      const tR  = toM.getBoundingClientRect();
      const yT  = fR.top + fR.height / 2 - pR.top;
      const yB  = lR.top + lR.height / 2 - pR.top;
      const yMd = (yT + yB) / 2;
      const yD  = tR.top + tR.height / 2 - pR.top;
      const xS  = mirror ? pR.width : 0;
      const xJ  = pR.width / 2;
      const xD2 = mirror ? 0 : pR.width;
      ln(svg, xS, yT,  xJ, yT);
      ln(svg, xS, yB,  xJ, yB);
      ln(svg, xJ, yT,  xJ, yB);
      ln(svg, xJ, yMd, xD2, yD);
    });
  }
}

function ln(svg,x1,y1,x2,y2) {
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1); l.setAttribute('y1',y1);
  l.setAttribute('x2',x2); l.setAttribute('y2',y2);
  l.setAttribute('class','pipe-line');
  svg.appendChild(l);
}

function pipes() {
  drawPipe('pipe-A','oct-L','qrt-L',false);
  drawPipe('pipe-B','qrt-L','sem-L',false);
  drawPipe('pipe-C', null,   null,  false);
  drawPipe('pipe-E','sem-R','qrt-R',false);
  drawPipe('pipe-F','qrt-R','oct-R',false);
}

window.addEventListener('load',   () => { render(); setTimeout(pipes,120); });
window.addEventListener('resize', () => setTimeout(pipes,60));
</script>
