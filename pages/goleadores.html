<!DOCTYPE html>
<html lang="es"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Goleadores — Intramuros Humboldt 2026</title>
  <link rel="icon" href="../logo/logo.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/public.css"/>
</head><body>
<nav id="topnav"></nav><div id="mob-nav"></div>
<div id="admin-ribbon" style="display:none"><div class="ribbon-inner"><span class="ribbon-lbl">⚙️ MODO EDICIÓN</span><div style="display:flex;gap:8px"><button class="btn btn-s btn-sm" onclick="PubAdmin.logout()">✕</button></div></div></div>

<div class="page-hero">
  <div class="page-hero-inner">
    <div><div class="page-hero-label">ESTADÍSTICAS</div><div class="page-hero-title">GOLEADORES &amp; DISCIPLINA</div><div class="page-hero-sub">Ranking completo por goles y tabla disciplinaria</div></div>
    <div style="display:flex;gap:10px;align-items:center">
      <select id="cat-filter" class="finput" style="width:190px" onchange="render()"><option value="">Todas las categorías</option></select>
      <a href="../index.html" class="back-link">← Inicio</a>
    </div>
  </div>
</div>

<main id="main">
  <div id="stats-row" class="stats-row"></div>
  <div class="two-col">
    <section style="margin:0">
      <div class="sec-head"><div><div class="sec-label">TOP GOLEADORES</div><div class="sec-title">GOLEADORES</div></div></div>
      <div id="scorers-wrap" class="scorers-list"></div>
    </section>
    <section style="margin:0">
      <div class="sec-head"><div><div class="sec-label">FAIR PLAY</div><div class="sec-title">DISCIPLINA</div></div></div>
      <div id="disc-wrap" class="scorers-list"></div>
    </section>
  </div>
</main>

<footer id="page-footer"></footer>
<div id="modal-bg" style="display:none"><div id="modal-box"><div id="modal-cnt"></div></div></div>
<div id="toast-ct"></div>
<script src="../js/config.js"></script>
<script src="../js/sheets.js"></script>
<script src="../js/public-common.js"></script>
<script src="../js/pub-carousel.js"></script>
<script src="../js/pub-notices.js"></script>
<script>
function initFilter(){ const s=document.getElementById('cat-filter'); DB.getCategorias().forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.nombre; s.appendChild(o); }); }
function render(){
  const catId=document.getElementById('cat-filter').value;
  let jugs=DB.getJugadores().filter(j=>j.estado==='activo');
  if(catId){ const eqIds=DB.getEquipos().filter(e=>e.categoriaId===catId).map(e=>e.id); jugs=jugs.filter(j=>eqIds.includes(j.equipoId)); }

  const totalGoles=jugs.reduce((s,j)=>s+(+j.goles||0),0);
  const totalAmarillas=jugs.reduce((s,j)=>s+(+j.amarillas||0),0);
  const totalRojas=jugs.reduce((s,j)=>s+(+j.rojas||0),0);
  document.getElementById('stats-row').innerHTML=[
    ['GOLES',totalGoles,'var(--y)'],['GOLEADORES',jugs.filter(j=>+j.goles>0).length,'var(--w)'],
    ['🟨 AMARILLAS',totalAmarillas,'var(--y)'],['🟥 ROJAS',totalRojas,'var(--r)'],
  ].map(([l,v,c])=>`<div class="stat-box"><div class="stat-box-n" style="color:${c}">${v}</div><div class="stat-box-l">${l}</div></div>`).join('');

  // goleadores
  const top=jugs.filter(j=>+j.goles>0).sort((a,b)=>+b.goles-+a.goles);
  const sel=document.getElementById('scorers-wrap');
  sel.innerHTML=top.length ? top.map((j,i)=>{
    const eq=DB.getEquipo(j.equipoId);
    const hue=(j.nombre.charCodeAt(0)*7)%360;
    return `<div class="scorer-row">
      <div class="sc-rk ${i===0?'rk1':i===1?'rk2':i===2?'rk3':''}">${i+1}</div>
      <div class="sc-av" style="background:hsl(${hue},40%,28%)">${j.foto64&&j.foto64.startsWith('data:')?`<img src="${j.foto64}" alt="">`:`${j.nombre[0]}`}</div>
      <div class="sc-info"><div class="sc-nm">${j.nombre} <span style="color:var(--g);font-size:11px">#${j.numero}</span></div><div class="sc-tm">${eq?.nombre||'—'} · ${j.posicion||'—'}</div></div>
      <div class="sc-meta">
        <div class="sc-mi"><div class="sc-mi-n">${j.amarillas}</div><div class="sc-mi-l">🟨</div></div>
        <div class="sc-mi"><div class="sc-mi-n" style="color:var(--r)">${j.rojas}</div><div class="sc-mi-l">🟥</div></div>
      </div>
      <div class="sc-gl">${j.goles}</div>
    </div>`;
  }).join('') : '<div class="empty"><div class="empty-ico">🥅</div><div class="empty-t">Sin goles</div></div>';

  // disciplina
  const disc=jugs.filter(j=>+j.amarillas>0||+j.rojas>0).sort((a,b)=>(+b.rojas*3+ +b.amarillas)-(+a.rojas*3+ +a.amarillas));
  document.getElementById('disc-wrap').innerHTML=disc.length ? disc.map((j,i)=>{
    const eq=DB.getEquipo(j.equipoId);
    const pts=+j.rojas*3+ +j.amarillas;
    return `<div class="scorer-row">
      <div class="sc-rk">${i+1}</div>
      <div class="sc-av" style="background:var(--b5)">${j.foto64&&j.foto64.startsWith('data:')?`<img src="${j.foto64}" alt="">`:`${j.nombre[0]}`}</div>
      <div class="sc-info"><div class="sc-nm">${j.nombre}</div><div class="sc-tm">${eq?.nombre||'—'}</div></div>
      <div class="sc-meta">
        <div class="sc-mi"><div class="sc-mi-n" style="color:var(--y)">${j.amarillas}</div><div class="sc-mi-l">🟨</div></div>
        <div class="sc-mi"><div class="sc-mi-n" style="color:var(--r)">${j.rojas}</div><div class="sc-mi-l">🟥</div></div>
      </div>
      <div class="sc-gl" style="font-size:18px;color:${pts>=5?'var(--r)':'var(--y)'}">${pts}</div>
    </div>`;
  }).join('') : '<div class="empty"><div class="empty-ico">🟨</div><div class="empty-t">Sin infracciones</div></div>';
}
document.addEventListener('data-ready',()=>{ initFilter(); render(); });
</script>
</body></html>
