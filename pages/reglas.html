<!DOCTYPE html>
<html lang="es"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reglas — Intramuros Humboldt 2026</title>
  <link rel="icon" href="../logo/logo.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/public.css"/>
</head><body>
<nav id="topnav"></nav><div id="mob-nav"></div>
<div id="admin-ribbon" style="display:none"><div class="ribbon-inner"><span class="ribbon-lbl">⚙️ MODO EDICIÓN</span><div style="display:flex;gap:8px"><button class="btn btn-s btn-sm" onclick="PubAdmin.logout()">✕</button></div></div></div>
<div class="page-hero">
  <div class="page-hero-inner">
    <div><div class="page-hero-label">REGLAMENTO OFICIAL</div><div class="page-hero-title">REGLAS DE FÚTBOL SALA</div><div class="page-hero-sub">Normas básicas del Intramuros Humboldt 2026</div></div>
    <a href="../index.html" class="back-link">← Inicio</a>
  </div>
</div>
<main id="main">
  <div class="rules-grid" id="reglas-wrap"></div>
</main>
<footer id="page-footer"></footer>
<div id="modal-bg" style="display:none"><div id="modal-box"><div id="modal-cnt"></div></div></div>
<div id="toast-ct"></div>
<script src="../js/config.js"></script>
<script src="../js/sheets.js"></script>
<script src="../js/public-common.js"></script>
<script src="../js/pub-carousel.js"></script>
<script src="../js/pub-notices.js"></script>
<script>
const REGLAS=[
  {icon:'👥',title:'JUGADORES POR EQUIPO',text:'Cada equipo debe presentar entre 5 y 8 jugadores registrados. Se requieren al menos 5 para iniciar un partido. Los números de dorsal deben ser únicos dentro del equipo.'},
  {icon:'⏱️',title:'DURACIÓN DEL PARTIDO',text:'Dos tiempos de 20 minutos con un descanso de 5 minutos entre periodos. El árbitro puede añadir tiempo de compensación según lo estime conveniente.'},
  {icon:'⚽',title:'GOLES Y MARCADOR',text:'Se anota un gol cuando el balón supera completamente la línea de portería. El equipo con más goles al final del tiempo reglamentario gana el partido.'},
  {icon:'🟨',title:'TARJETAS AMARILLAS',text:'Dos tarjetas amarillas en el mismo partido equivalen a expulsión inmediata. Las amarillas se pueden acumular entre partidos según el reglamento del torneo.'},
  {icon:'🟥',title:'TARJETA ROJA',text:'Expulsión inmediata del campo de juego. El equipo continúa con un jugador menos hasta el final. El sancionado no puede participar en el partido siguiente.'},
  {icon:'⟳',title:'IDA Y VUELTA',text:'En series eliminatorias se juegan dos partidos (uno en cancha de cada equipo). El marcador global es la suma de ambos. En empate global puede aplicarse prórroga o penales.'},
  {icon:'↕️',title:'CAMBIOS',text:'Hasta 5 cambios por partido, solo durante pausas autorizadas por el árbitro. El jugador que sale no puede reingresar al campo en ese partido.'},
  {icon:'⚖️',title:'FAIR PLAY',text:'Se espera comportamiento deportivo de todos los participantes. Faltas reiteradas, lenguaje irrespetuoso o actitudes antideportivas pueden conllevar descalificación.'},
  {icon:'📋',title:'TABLA DE POSICIONES',text:'3 puntos por victoria, 1 por empate, 0 por derrota. En igualdad de puntos se aplica en orden: diferencia de goles, goles a favor, resultado directo entre los equipos.'},
  {icon:'🏆',title:'CLASIFICACIÓN',text:'Los primeros clasificados de cada categoría avanzan a la siguiente fase. El formato de semifinales y final se anunciará al concluir la fase de grupos.'},
  {icon:'🩺',title:'LESIONES',text:'El árbitro puede detener el juego por lesión. El tiempo perdido por lesiones o situaciones extraordinarias puede compensarse al final del periodo.'},
  {icon:'🥅',title:'PORTERO',text:'El portero puede detener el balón con las manos dentro de su área. Si recibe un pase de su propio equipo con el pie, no puede tomarlo con las manos.'},
  {icon:'📍',title:'FUERA DE JUEGO',text:'En fútbol sala no aplica la regla de fuera de juego (offside) como en fútbol 11. Los jugadores pueden estar en cualquier posición dentro del campo.'},
  {icon:'📵',title:'DISPOSITIVOS MÓVILES',text:'Está prohibido el uso de teléfonos durante el partido para los jugadores. El cuerpo técnico debe mantenerse en la zona designada y no interferir con el árbitro.'},
];
document.addEventListener('data-ready',()=>{
  document.getElementById('reglas-wrap').innerHTML=REGLAS.map(r=>
    `<div class="rule-card"><div class="rule-icon">${r.icon}</div><div class="rule-title">${r.title}</div><div class="rule-text">${r.text}</div></div>`
  ).join('');
});
</script>
</body></html>
