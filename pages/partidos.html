<!DOCTYPE html>
<html lang="es"><head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Partidos — Intramuros Humboldt 2026</title>
  <link rel="icon" href="../logo/logo.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/public.css"/>
</head><body>
<nav id="topnav"></nav><div id="mob-nav"></div>
<div id="admin-ribbon" style="display:none"><div class="ribbon-inner"><span class="ribbon-lbl">⚙️ MODO EDICIÓN</span><div style="display:flex;gap:8px"><button class="btn btn-r btn-sm" onclick="Carousel.openAdmin()">🖼️ Carrusel</button><button class="btn btn-y btn-sm" onclick="Notices.openForm()">📢 Aviso</button><button class="btn btn-s btn-sm" onclick="PubAdmin.logout()">✕</button></div></div></div>

<div class="page-hero">
  <div class="page-hero-inner">
    <div>
      <div class="page-hero-label">CALENDARIO</div>
      <div class="page-hero-title">PARTIDOS</div>
      <div class="page-hero-sub" id="stats-sub">Todos los partidos del torneo</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <select id="cat-filter" class="finput" style="width:180px" onchange="renderAll()">
        <option value="">Todas las categorías</option>
      </select>
      <select id="state-filter" class="finput" style="width:160px" onchange="renderAll()">
        <option value="">Todos los estados</option>
        <option value="en_juego">⚽ En juego</option>
        <option value="programado">Programados</option>
        <option value="finalizado">Finalizados</option>
        <option value="pendiente">Pendientes</option>
      </select>
      <a href="../index.html" class="back-link">← Inicio</a>
    </div>
  </div>
</div>

<main id="main">
  <div id="stats-row" class="stats-row" style="margin-bottom:28px"></div>

  <!-- EN VIVO -->
  <section id="s-live" style="display:none">
    <div class="sec-head"><div><div class="sec-label" style="color:var(--r)">⚽ EN CURSO</div><div class="sec-title">EN VIVO</div></div></div>
    <div id="live-wrap" class="matches-grid"></div>
  </section>

  <!-- PRÓXIMOS -->
  <section id="s-proximos">
    <div class="sec-head"><div><div class="sec-label">PROGRAMADOS</div><div class="sec-title">PRÓXIMOS PARTIDOS</div></div></div>
    <div id="proximos-wrap" class="matches-grid"></div>
  </section>

  <!-- SERIES IDA Y VUELTA -->
  <section id="s-series">
    <div class="sec-head"><div><div class="sec-label">ELIMINATORIAS</div><div class="sec-title">IDA &amp; VUELTA</div><div class="sec-sub">Marcador global acumulado</div></div></div>
    <div id="series-wrap"></div>
  </section>

  <!-- RESULTADOS -->
  <section id="s-resultados">
    <div class="sec-head"><div><div class="sec-label">HISTORIA</div><div class="sec-title">RESULTADOS</div></div></div>
    <div id="resultados-wrap" class="matches-grid"></div>
  </section>
</main>

<footer id="page-footer"></footer>
<div id="modal-bg" style="display:none"><div id="modal-box"><div id="modal-cnt"></div></div></div>
<div id="toast-ct"></div>
<script src="../js/config.js"></script>
<script src="../js/sheets.js"></script>
<script src="../js/public-common.js"></script>
<script src="../js/pub-carousel.js"></script>
<script src="../js/pub-notices.js"></script>
<script>
function initFilters(){
  const sel=document.getElementById('cat-filter');
  DB.getCategorias().forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.nombre; sel.appendChild(o); });
}

function renderAll(){
  const catId=document.getElementById('cat-filter').value;
  const state=document.getElementById('state-filter').value;
  let todos=DB.getPartidos();
  if(catId) todos=todos.filter(p=>p.categoriaId===catId);
  if(state) todos=todos.filter(p=>p.estado===state);

  const live    = todos.filter(p=>['en_juego','pausado'].includes(p.estado));
  const proximos= todos.filter(p=>p.estado==='programado').sort((a,b)=>(a.fecha||'z').localeCompare(b.fecha||'z'));
  const finalizados=todos.filter(p=>p.estado==='finalizado').sort((a,b)=>b.fecha.localeCompare(a.fecha));

  // stats
  const allTodos = DB.getPartidos();
  document.getElementById('stats-row').innerHTML=[
    ['EN VIVO', allTodos.filter(p=>p.estado==='en_juego').length,'var(--r)'],
    ['PROGRAMADOS', allTodos.filter(p=>p.estado==='programado').length,'var(--y)'],
    ['FINALIZADOS', allTodos.filter(p=>p.estado==='finalizado').length,'var(--ok)'],
    ['PENDIENTES', allTodos.filter(p=>p.estado==='pendiente').length,'var(--g)'],
    ['TOTAL', allTodos.length,'var(--w)'],
  ].map(([l,v,c])=>`<div class="stat-box"><div class="stat-box-n" style="color:${c}">${v}</div><div class="stat-box-l">${l}</div></div>`).join('');

  // live
  const slive=document.getElementById('s-live');
  if(live.length){ slive.style.display=''; document.getElementById('live-wrap').innerHTML=live.map(p=>matchCardHTML(p)).join(''); }
  else slive.style.display='none';

  // proximos
  document.getElementById('proximos-wrap').innerHTML=proximos.length
    ? proximos.map(p=>matchCardHTML(p)).join('')
    : '<div class="empty"><div class="empty-ico">📅</div><div class="empty-t">Sin partidos programados</div></div>';

  // series
  const seriesIds=[...new Set(todos.filter(p=>p.serieId&&+p.totalEnSerie===2).map(p=>p.serieId))];
  document.getElementById('series-wrap').innerHTML=seriesIds.length ? seriesHTML(seriesIds)
    : '<div class="empty"><div class="empty-ico">⟳</div><div class="empty-t">Sin series en esta selección</div></div>';

  // resultados
  document.getElementById('resultados-wrap').innerHTML=finalizados.length
    ? finalizados.map(p=>matchCardHTML(p)).join('')
    : '<div class="empty"><div class="empty-ico">🏆</div><div class="empty-t">Sin resultados aún</div></div>';
}

document.addEventListener('data-ready',()=>{ initFilters(); renderAll(); setInterval(renderAll,60000); });
</script>
</body></html>
